    <script>
      const apiKey = "AIzaSyB1wkiHkuvoxQ-C48-_8ZIAuyVsHqMvtgE";

      function buscarVideos() {
        const busca = document.getElementById("busca").value;
        const resultado = busca.replace(/\s+/g, "+");
        fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${resultado}&key=${apiKey}&maxResults=10`)
          .then(res => res.json())
          .then(data => {
            const div = document.getElementById("videos");
            div.innerHTML = "";
            data.items.forEach(video => {
              const cartao = document.createElement("div");
              cartao.classList.add("cartao-video");
              const videoId = video.id.videoId;
              const iframe = document.createElement("iframe");
              iframe.width = "100%";
              iframe.height = "300";
              iframe.src = `https://www.youtube.com/embed/${videoId}`;
              iframe.frameBorder = "0";
              iframe.allowFullscreen = true;
              const title = document.createElement("p");
              title.textContent = video.snippet.title;
              cartao.appendChild(iframe);
              cartao.appendChild(title);
              div.appendChild(cartao);
            });
          });
      }

      const menu = document.getElementById("menu");
      function toggleMenu() {
        menu.classList.toggle("show");
      }
    </script>

function abrirModalVips() {
  if (!LISTA_VIPS.length) {
    alert("A lista de VIPs está vazia. Edite o array LISTA_VIPS no index.html.");
    return;
  }

  const overlay = document.createElement("div");
  overlay.id = "modalVipsOverlay";
  overlay.style.cssText = `
    position:fixed;inset:0;background:rgba(0,0,0,0.85);
    z-index:9999;display:flex;align-items:center;justify-content:center;
  `;

  overlay.innerHTML = `
    <div style="
      background:#1a1a1a;border:2px solid #9146ff;border-radius:20px;
      padding:24px;width:min(95vw,480px);max-height:85vh;
      display:flex;flex-direction:column;gap:12px;
    ">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <h2 style="margin:0;color:#fff;font-size:1.1rem;">⭐ Adicionar VIPs à Roleta</h2>
        <span id="vipContador" style="color:#9146ff;font-weight:700;font-size:13px;background:rgba(145,70,255,0.15);padding:4px 10px;border-radius:20px;">0 selecionados</span>
      </div>

      <input id="vipSearch" type="text" placeholder="Pesquisar VIP..." style="
        flex:1;padding:8px 12px;border-radius:10px;border:none;
        background:#333;color:#fff;font-size:13px;outline:none;
      ">

      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <button id="vipSelecionarTodos" style="padding:6px 12px;border-radius:10px;background:#555;color:#fff;font-size:12px;border:none;cursor:pointer;">✅ Selecionar tudo</button>
        <button id="vipDesmarcarTodos" style="padding:6px 12px;border-radius:10px;background:#555;color:#fff;font-size:12px;border:none;cursor:pointer;">❌ Desmarcar tudo</button>
      </div>

      <div id="vipListaScroll" style="
        overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:6px;
        max-height:380px;padding-right:4px;
      "></div>

      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button id="vipCancelar" style="
          padding:10px 18px;border-radius:12px;background:#444;
          color:#fff;border:none;cursor:pointer;font-weight:700;
        ">Cancelar</button>
        <button id="vipConfirmar" style="
          padding:10px 18px;border-radius:12px;background:#9146ff;
          color:#fff;border:none;cursor:pointer;font-weight:700;
        ">⭐ Adicionar à Roleta</button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);

  const lista        = document.getElementById("vipListaScroll");
  const searchInput  = document.getElementById("vipSearch");
  const contador     = document.getElementById("vipContador");
  let selecionados = new Set();
  let qtdPorVip    = {}; // nome -> quantidade de tickets

  function atualizarContador() {
    contador.textContent = selecionados.size + " selecionado" + (selecionados.size !== 1 ? "s" : "");
  }

  function renderLista() {
    const busca = searchInput.value.toLowerCase();
    const filtrados = LISTA_VIPS.filter(n => n.toLowerCase().includes(busca));
    lista.innerHTML = "";

    filtrados.forEach(nome => {
      const marcado = selecionados.has(nome);
      const item = document.createElement("div");
      item.style.cssText = `
        display:flex;align-items:center;gap:10px;padding:10px 14px;
        border-radius:10px;cursor:pointer;
        background:${marcado ? "rgba(145,70,255,0.25)" : "rgba(255,255,255,0.05)"};
        border:1px solid ${marcado ? "#9146ff" : "transparent"};
        transition:background 0.15s;
      `;

      const check = document.createElement("input");
      check.type = "checkbox";
      check.checked = marcado;
      check.style.cssText = "accent-color:#9146ff;width:16px;height:16px;cursor:pointer;flex-shrink:0;";

      const label = document.createElement("span");
      label.style.cssText = "color:#fff;font-size:14px;flex:1;font-weight:500;";
      label.textContent = nome;

      const badge = document.createElement("span");
      badge.style.cssText = "color:#9146ff;font-size:11px;font-weight:700;background:rgba(145,70,255,0.15);padding:2px 8px;border-radius:20px;flex-shrink:0;";
      badge.textContent = "VIP";

      // Controle de quantidade
      const controle = document.createElement("div");
      controle.style.cssText = "display:flex;align-items:center;gap:4px;flex-shrink:0;";
      controle.innerHTML = `
        <button class="vip-preset" data-v="1"  style="padding:3px 7px;border-radius:8px;background:#444;color:#fff;font-size:11px;border:none;cursor:pointer;">+1</button>
        <button class="vip-preset" data-v="5"  style="padding:3px 7px;border-radius:8px;background:#444;color:#fff;font-size:11px;border:none;cursor:pointer;">+5</button>
        <button class="vip-preset" data-v="10" style="padding:3px 7px;border-radius:8px;background:#444;color:#fff;font-size:11px;border:none;cursor:pointer;">+10</button>
        <input class="vip-qtd" type="number" min="1" value="${qtdPorVip[nome] || 1}" style="
          width:46px;padding:3px 6px;border-radius:8px;border:1px solid #9146ff;
          background:#222;color:#9146ff;font-size:12px;font-weight:700;text-align:center;
        ">
      `;

      controle.querySelectorAll(".vip-preset").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          const input = controle.querySelector(".vip-qtd");
          const atual = parseInt(input.value) || 1;
          input.value = atual + parseInt(btn.dataset.v);
          qtdPorVip[nome] = parseInt(input.value);
        });
      });
      controle.querySelector(".vip-qtd").addEventListener("click", e => e.stopPropagation());
      controle.querySelector(".vip-qtd").addEventListener("input", e => {
        const v = Math.max(1, parseInt(e.target.value) || 1);
        qtdPorVip[nome] = v;
        e.target.value = v;
      });

      item.appendChild(check);
      item.appendChild(label);
      item.appendChild(badge);
      item.appendChild(controle);

      item.addEventListener("click", () => {
        if (selecionados.has(nome)) selecionados.delete(nome);
        else selecionados.add(nome);
        atualizarContador();
        renderLista();
      });

      lista.appendChild(item);
    });
  }

  renderLista();
  atualizarContador();
  searchInput.addEventListener("input", renderLista);

  document.getElementById("vipSelecionarTodos").onclick = () => {
    const busca = searchInput.value.toLowerCase();
    LISTA_VIPS.filter(n => n.toLowerCase().includes(busca)).forEach(n => selecionados.add(n));
    atualizarContador();
    renderLista();
  };

  document.getElementById("vipDesmarcarTodos").onclick = () => {
    selecionados.clear();
    atualizarContador();
    renderLista();
  };

  document.getElementById("vipConfirmar").onclick = () => {
    const modo = localStorage.getItem(PREFIX + "modoCor") || "colorido";
    const paraAdicionar = selecionados.size > 0 ? [...selecionados] : [...LISTA_VIPS];
    let totalTickets = 0;

    for (const nm of paraAdicionar) {
      const vezes = Math.max(1, parseInt(qtdPorVip[nm]) || 1);
      for (let i = 0; i < vezes; i++) {
        nomes.push(nm);
        if (modo === "colorido") {
          cores.push(corAleatoria());
        } else {
          cores.push(paletaNeutra[Math.floor(Math.random() * paletaNeutra.length)]);
        }
      }
      totalTickets += vezes;
    }

    salvar();
    gerarBuffer();
    desenhar();
    embaralhar();
    atualizarCentro();
    atualizar();
    document.body.removeChild(overlay);
    alert(`⭐ ${paraAdicionar.length} VIP(s) adicionado(s) com ${totalTickets} ticket(s) no total!`);
  };

  document.getElementById("vipCancelar").onclick = () => document.body.removeChild(overlay);
  overlay.addEventListener("click", e => { if (e.target === overlay) document.body.removeChild(overlay); });
}

document.getElementById("btnVips").addEventListener("click", abrirModalVips);
</script>
